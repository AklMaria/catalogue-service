services:
  postgres:
    image: postgres:16
    container_name: catalogue-postgres
    environment:
      POSTGRES_DB: catalogue_db
      POSTGRES_USER: catalogue_user
      POSTGRES_PASSWORD: catalogue_pass
    ports:
      - "5432:5432"
    volumes:
      - catalogue_pgdata:/var/lib/postgresql/data

  catalogue-service:
    build: .
    container_name: catalogue-service
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/catalogue_db
      DB_USER: catalogue_user
      DB_PASSWORD: catalogue_pass
      RABBIT_HOST: booking-rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8081:8081"
    networks:
      - shared

volumes:
  catalogue_pgdata:

networks:
  shared:
    external: true
    name: gestione-risorse-net  //ho creato questa rete condivisa perche anche questo service deve contattare rabbit mq