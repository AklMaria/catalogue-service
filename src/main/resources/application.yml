server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/catalogue_db}
    username: ${DB_USER:catalogue_user}
    password: ${DB_PASSWORD:catalogue_pass}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}

# a prova di indentazione / binding (equivalente alla sezione sopra)
spring.mvc.pathmatch.matching-strategy: ant_path_matcher

management:
  endpoints:
    web:
      exposure:
        include: health,info